name: Release Tauri Desktop App

# Automatically build and release desktop app when creating a new GitHub release
# Based on Tauri's official automated release guide

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxss-dev

      - name: Install dependencies
        run: npm ci

      - name: Require updater public key
        shell: bash
        run: |
          if [ -z "${TRACE_UPDATER_PUBKEY:-}" ]; then
            echo "TRACE_UPDATER_PUBKEY is required for release builds"
            exit 1
          fi

      - name: Run pre-release verification
        run: npm run test:release
        env:
          RUN_TAURI_BUILD: 0

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRACE_UPDATER_PUBKEY: ${{ secrets.TRACE_UPDATER_PUBKEY }}
        with:
          tagName: ${{ github.event.release.tag_name }}
          releaseName: ${{ github.event.release.name }}
