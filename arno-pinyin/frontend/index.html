<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arno 中文 - AI 雅思/托福写作批改</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(180deg, #f0f4ff 0%, #f5f5f5 100%);
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 42px;
      color: #1a1a1a;
      margin-bottom: 12px;
    }

    .header p {
      font-size: 18px;
      color: #666;
    }

    .price-badge {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 14px;
      margin-top: 16px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 4px 16px rgba(102, 126, 234, 0.08);
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
    }

    .exam-type-select {
      display: flex;
      gap: 12px;
    }

    .exam-type-item {
      flex: 1;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .exam-type-item.selected {
      border-color: #667eea;
      background: #f0f4ff;
      color: #667eea;
    }

    .form-group textarea {
      width: 100%;
      min-height: 160px;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 16px;
      line-height: 1.6;
      resize: vertical;
    }

    .form-group textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
    }

    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 50px;
      height: 56px;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
    }

    .submit-btn:disabled {
      background: #ccc;
      box-shadow: none;
      cursor: not-allowed;
    }

    .user-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .remaining {
      font-size: 16px;
      color: #666;
    }

    .remaining .count {
      color: #667eea;
      font-weight: bold;
      font-size: 18px;
    }

    .result-area {
      display: none;
    }

    .result-area.show {
      display: block;
    }

    .result-title {
      font-size: 20px;
      font-weight: 600;
      color: #333;
      margin-bottom: 16px;
    }

    .result-content {
      font-size: 16px;
      line-height: 1.8;
      color: #444;
      white-space: pre-wrap;
      background: #fafafa;
      padding: 20px;
      border-radius: 12px;
    }

    .loading {
      text-align: center;
      color: #999;
      font-size: 16px;
      padding: 40px 0;
      display: none;
    }

    .loading.show {
      display: block;
    }

    .price-table {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 16px;
    }

    .price-card {
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .price-card:hover {
      border-color: #667eea;
    }

    .price-card .name {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .price-card .price {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
    }

    .login-section {
      text-align: center;
      padding: 40px 20px;
    }

    .wechat-login-btn {
      background: #07c160;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 16px 40px;
      font-size: 18px;
      cursor: pointer;
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      padding-top: 30px;
      border-top: 1px solid #eee;
      color: #999;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <!-- 未登录 -->
    <div id="login-section" class="login-section" style="display: none;">
      <h2>欢迎使用 Arno 中文</h2>
      <p style="margin: 20px 0; color: #666;">AI 雅思/托福/多邻国写作批改，平价好用即时出结果</p>
      <button class="wechat-login-btn" onclick="wechatLogin()">
        📱 微信一键登录
      </button>
    </div>

    <!-- 已登录 -->
    <div id="main-content" style="display: none;">
      <div class="header">
        <h1>✍️ Arno 中文</h1>
        <p>AI 雅思/托福/多邻国写作批改 · 即时出结果 · 平价好用</p>
        <div class="price-badge">单次 ¥2.99 / 月卡 ¥29.9 无限次</div>
      </div>

      <div class="card">
        <div class="user-info">
          <div class="remaining">
            剩余次数：<span class="count" id="remaining-count">0</span>
          </div>
          <div>
            <button onclick="window.location.reload()" style="background: #f0f0f0; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer;">刷新</button>
          </div>
        </div>

        <div class="form-group">
          <label>考试类型</label>
          <div class="exam-type-select">
            <div class="exam-type-item selected" data-type="ielts" onclick="selectExamType(this)">
              雅思 IELTS
            </div>
            <div class="exam-type-item" data-type="toefl" onclick="selectExamType(this)">
              托福 TOEFL
            </div>
            <div class="exam-type-item" data-type="duolingo" onclick="selectExamType(this)">
              多邻国 Duolingo
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>题目要求（可选）</label>
          <textarea id="question" placeholder="粘贴作文题目要求，如果有的话"></textarea>
        </div>

        <div class="form-group">
          <label>你的作文</label>
          <textarea id="content" placeholder="粘贴你的作文内容在这里..."></textarea>
        </div>

        <button class="submit-btn" id="submit-btn" onclick="submitCorrection()" disabled>
          🚀 提交批改
        </button>
      </div>

      <div class="loading" id="loading">
        ⏳ AI正在批改中，请稍候...
      </div>

      <div class="card result-area" id="result-area">
        <div class="result-title">📝 批改结果</div>
        <div class="result-content" id="result-content"></div>
      </div>

      <div class="card">
        <div class="result-title">💎 购买套餐</div>
        <div class="price-table">
          <div class="price-card" onclick="buyProduct('single')">
            <div class="name">单次批改</div>
            <div class="price">¥2.99</div>
          </div>
          <div class="price-card" onclick="buyProduct('month')">
            <div class="name">月卡无限次</div>
            <div class="price">¥29.9</div>
          </div>
          <div class="price-card" onclick="buyProduct('quarter')">
            <div class="name">季度卡</div>
            <div class="price">¥69.9</div>
          </div>
        </div>
      </div>

      <div class="footer">
        比人工批改便宜，比免费工具专业，帮你快速提高写作成绩 🎉
      </div>
    </div>
  </div>

  <script>
    const API_HOST = 'https://your-backend-domain.com'  // 改成你的后端地址
    let token = localStorage.getItem('arno_token')
    let selectedExamType = 'ielts'

    // 初始化
    function init() {
      if (!token) {
        document.getElementById('login-section').style.display = 'block'
        document.getElementById('main-content').style.display = 'none'
      } else {
        document.getElementById('login-section').style.display = 'none'
        document.getElementById('main-content').style.display = 'block'
        loadUserInfo()
      }
    }

    function wechatLogin() {
      // 跳转到微信登录
      window.location.href = API_HOST + '/api/auth/wechat'
    }

    function selectExamType(el) {
      document.querySelectorAll('.exam-type-item').forEach(item => {
        item.classList.remove('selected')
      })
      el.classList.add('selected')
      selectedExamType = el.getAttribute('data-type')
    }

    async function loadUserInfo() {
      try {
        const res = await fetch(API_HOST + '/api/user/info', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        })
        const data = await res.json()
        if (data.code === 200) {
          document.getElementById('remaining-count').textContent = data.data.remaining_counts
          checkSubmitEnabled()
        }
      } catch (err) {
        console.error(err)
      }
    }

    function checkSubmitEnabled() {
      const content = document.getElementById('content').value.trim()
      const remaining = parseInt(document.getElementById('remaining-count').textContent)
      const btn = document.getElementById('submit-btn')
      
      if (!content) {
        btn.disabled = true
        return
      }
      
      // 如果是会员或者还有次数，允许提交
      btn.disabled = remaining <= 0
    }

    document.getElementById('content').addEventListener('input', checkSubmitEnabled)
    document.getElementById('question').addEventListener('input', checkSubmitEnabled)

    async function submitCorrection() {
      const question = document.getElementById('question').value.trim()
      const content = document.getElementById('content').value.trim()

      if (!content) {
        alert('请输入作文内容')
        return
      }

      document.getElementById('loading').classList.add('show')
      document.getElementById('result-area').classList.remove('show')
      document.getElementById('submit-btn').disabled = true

      try {
        const res = await fetch(API_HOST + '/api/correct/writing', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            exam_type: selectedExamType,
            question: question,
            content: content
          })
        })

        const data = await res.json()
        if (data.code === 200) {
          document.getElementById('result-content').textContent = data.data.correction
          document.getElementById('result-area').classList.add('show')
          document.getElementById('remaining-count').textContent = data.data.remaining
          loadUserInfo()
        } else {
          alert(data.msg || '批改失败，请重试')
        }
      } catch (err) {
        alert('网络错误，请重试')
      } finally {
        document.getElementById('loading').classList.remove('show')
        document.getElementById('submit-btn').disabled = false
      }
    }

    function buyProduct(type) {
      // 创建订单，跳转到微信支付
      fetch(API_HOST + '/api/order/create', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ type: type })
      })
      .then(res => res.json())
      .then(data => {
        if (data.code === 200) {
          // 调用微信支付
          // WeixinJSBridge.invoke('getBrandWCPayRequest', {
          //   "appId": "...",
          //   "timeStamp": "...",
          //   "nonceStr": "...",
          //   "package": "...",
          //   "signType": "MD5",
          //   "paySign": data.data.prepay_id
          // }, function(res){
          //   if(res.err_msg == "get_brand_wcpay_request:ok") {
          //     loadUserInfo()
          //   }
          // });
          alert('创建订单成功，请完成支付')
        }
      })
    }

    // 页面加载完成初始化
    window.onload = init
  </script>
</body>
</html>
